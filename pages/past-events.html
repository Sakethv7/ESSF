<!--
  HOW TO ADD PHOTOS (Google Drive — zero server storage):
  1. Right-click photo in Drive → "Get link" → set to "Anyone with the link"
  2. Copy FILE_ID from: drive.google.com/file/d/FILE_ID/view
  3. Add tiles using this pattern inside .gallery-grid:

  <div class="gallery-item">
    <a href="https://drive.google.com/file/d/FILE_ID/view" target="_blank" rel="noopener" title="View full photo">
      <img src="https://drive.google.com/thumbnail?id=FILE_ID&sz=w400"
           alt="Brief description" loading="lazy" />
    </a>
    <div class="overlay">View Full</div>
  </div>
-->
<section>
  <div class="container">

    <div class="gallery-grid">
